<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://*.pythonanywhere.com data: gap: https://ssl.gstatic.com 'unsafe-eval' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://*.pythonanywhere.com; connect-src 'self' https://*.pythonanywhere.com">
    <title>寻尤</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .loading {
            text-align: center;
            color: #fff;
        }
        .loading-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            border-radius: 20px;
            background: linear-gradient(135deg, #ff6b9d, #c44dff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            color: white;
            animation: pulse 1.5s ease-in-out infinite;
        }
        .loading-text {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(135deg, #ff6b9d, #c44dff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .loading-sub {
            font-size: 14px;
            color: rgba(255,255,255,0.5);
        }
        .spinner {
            width: 30px;
            height: 30px;
            margin: 20px auto;
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid #ff6b9d;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    </style>
</head>
<body>
    <div class="loading">
        <div class="loading-icon">尤</div>
        <div class="loading-text">寻尤</div>
        <div class="loading-sub">正在连接服务器...</div>
        <div class="spinner"></div>
    </div>
    <!--
        Cordova会自动加载config.xml中content src指定的URL
        这个页面只在加载远程内容前短暂显示
    -->
    <script type="text/javascript" src="cordova.js"></script>
    <script>
        document.addEventListener('deviceready', function() {
            // 状态栏设置
            if (window.StatusBar) {
                StatusBar.overlaysWebView(true);
                StatusBar.styleLightContent();
            }
            // 隐藏启动画面
            if (navigator.splashscreen) {
                setTimeout(function() {
                    navigator.splashscreen.hide();
                }, 1000);
            }
        }, false);
        
        // 处理Android返回键
        document.addEventListener('backbutton', function(e) {
            e.preventDefault();
            // 如果可以后退就后退，否则退出
            // WebView内的页面有自己的导航逻辑
        }, false);
    </script>
</body>
</html>
