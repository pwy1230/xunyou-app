<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>社交软件分类推荐图生成器</title>
<script src="https://cdn.bootcdn.net/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Microsoft YaHei','PingFang SC',sans-serif; background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%); min-height:100vh; padding:16px; color:#fff; }
.container { max-width:1400px; margin:0 auto; }
h1 { text-align:center; margin-bottom:16px; font-size:1.6rem; background:linear-gradient(90deg,#ff6b9d,#c44dff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.main-layout { display:grid; grid-template-columns:380px 1fr; gap:16px; }
.panel { background:rgba(255,255,255,0.05); border-radius:14px; padding:16px; backdrop-filter:blur(10px); }
.panel-title { font-size:1rem; margin-bottom:12px; color:#ff6b9d; font-weight:600; }
label { display:block; font-size:13px; color:rgba(255,255,255,0.7); margin-bottom:4px; margin-top:10px; }
input[type=text],input[type=color],select,textarea { width:100%; padding:8px 12px; border:1px solid rgba(255,255,255,0.15); border-radius:8px; background:rgba(0,0,0,0.3); color:#fff; font-size:13px; outline:none; }
input[type=text]:focus,select:focus,textarea:focus { border-color:#ff6b9d; }
select option { background:#1a1a2e; color:#fff; }
input[type=color] { height:36px; padding:2px; cursor:pointer; }
.btn { padding:10px 20px; border:none; border-radius:10px; cursor:pointer; font-size:13px; font-weight:600; transition:all 0.3s; }
.btn-primary { background:linear-gradient(135deg,#ff6b9d,#c44dff); color:#fff; }
.btn-primary:hover { transform:translateY(-2px); box-shadow:0 5px 20px rgba(196,77,255,0.4); }
.btn-export { background:linear-gradient(135deg,#00d9ff,#00ff88); color:#1a1a1a; }
.btn-export:hover { transform:translateY(-2px); box-shadow:0 5px 20px rgba(0,217,255,0.4); }
.btn-row { display:flex; gap:10px; margin-top:14px; flex-wrap:wrap; }
.cat-section { background:rgba(0,0,0,0.2); border-radius:10px; padding:10px; margin-top:8px; border-left:3px solid #ff6b9d; }
.cat-header { display:flex; align-items:center; gap:8px; cursor:pointer; user-select:none; }
.cat-header .arrow { transition:transform 0.3s; font-size:12px; }
.cat-header .arrow.open { transform:rotate(90deg); }
.cat-body { margin-top:8px; display:none; }
.cat-body.show { display:block; }
.cat-body input,.cat-body textarea { margin-bottom:6px; }
.cat-body textarea { height:40px; resize:none; }
.app-chips { display:flex; flex-wrap:wrap; gap:6px; margin-top:4px; }
.app-chip { padding:4px 10px; border-radius:16px; font-size:12px; cursor:pointer; border:1px solid rgba(255,255,255,0.2); transition:all 0.2s; user-select:none; }
.app-chip.selected { border-color:#ff6b9d; background:rgba(255,107,157,0.2); color:#ff6b9d; }
.app-chip .star { color:#f1c40f; margin-left:4px; font-size:10px; }
.add-cat-btn { width:100%; padding:8px; border:1px dashed rgba(255,255,255,0.3); border-radius:10px; background:transparent; color:rgba(255,255,255,0.5); cursor:pointer; margin-top:10px; font-size:13px; }
.add-cat-btn:hover { border-color:#ff6b9d; color:#ff6b9d; }
.del-cat { background:rgba(231,76,60,0.2); color:#e74c3c; border:none; border-radius:6px; padding:3px 10px; font-size:12px; cursor:pointer; margin-left:auto; }
.preview-area { min-height:300px; display:flex; align-items:flex-start; justify-content:center; background:rgba(0,0,0,0.2); border-radius:12px; overflow:auto; max-height:calc(100vh - 100px); }
.canvas-wrapper { width:621px; min-height:828px; flex-shrink:0; overflow:hidden; }
#exportContainer { position:fixed; left:-9999px; top:0; z-index:-1; }
@media(max-width:900px) {
  .main-layout { grid-template-columns:1fr; }
  .canvas-wrapper { width:100%; }
}
</style>
</head>
<body>
<div class="container">
  <h1>🎨 社交软件分类推荐图生成器</h1>
  <div class="main-layout">
    <div class="panel" style="max-height:calc(100vh - 80px);overflow-y:auto;">
      <div class="panel-title">⚙️ 配置面板</div>
      <label>选择模板</label>
      <select id="templateSelect" onchange="loadTemplate(this.value)">
        <option value="0">模板1：七大细分选择</option>
        <option value="1">模板2：面基效率排行</option>
        <option value="2">模板3：男生视角推荐</option>
        <option value="3">模板4：省钱避坑版</option>
        <option value="4">模板5：年龄分段推荐</option>
        <option value="5">模板6：按需求分类</option>
      </select>
      <label>标题</label>
      <input type="text" id="titleInput" oninput="renderPreview()">
      <label>副标题</label>
      <input type="text" id="subtitleInput" oninput="renderPreview()">
      <label>文案风格</label>
      <select id="copyStyle" onchange="applyCopyStyle(this.value)">
        <option value="0">简洁型</option>
        <option value="1">口语型</option>
        <option value="2">数据型</option>
      </select>
      <label>背景色</label>
      <input type="color" id="bgColor" value="#0a0a1a" oninput="renderPreview()">
      <div class="panel-title" style="margin-top:14px;">📂 分类管理</div>
      <div id="catList"></div>
      <button class="add-cat-btn" onclick="addCategory()">+ 添加分类</button>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="renderPreview()">🔄 生成预览</button>
        <button class="btn btn-export" onclick="exportPNG()">📤 导出PNG</button>
      </div>
    </div>
    <div class="panel">
      <div class="panel-title">👁️ 预览</div>
      <div class="preview-area" id="previewArea">
        <div style="color:rgba(255,255,255,0.5);">选择模板后点击「生成预览」</div>
      </div>
    </div>
  </div>
</div>
<div id="exportContainer"></div>

// ========== State ==========
var state = {
  title:'', subtitle:'', bgColor:'#0a0a1a',
  categories: []
};

// ========== Load template ==========
function loadTemplate(idx) {
  var tpl = TEMPLATES[idx];
  document.getElementById('titleInput').value = tpl.title;
  document.getElementById('subtitleInput').value = tpl.subtitle;
  state.title = tpl.title;
  state.subtitle = tpl.subtitle;
  state.categories = JSON.parse(JSON.stringify(tpl.categories));
  applyCopyStyle(document.getElementById('copyStyle').value);
  buildCatUI();
  renderPreview();
}

// ========== Apply copy style ==========
function applyCopyStyle(idx) {
  var style = COPY_STYLES[idx];
  state.categories.forEach(function(cat) {
    if (style.descs[cat.name]) {
      cat.desc = style.descs[cat.name];
    }
  });
  state.categories.forEach(function(cat, i) {
    var ta = document.getElementById('catDesc_' + i);
    if (ta) ta.value = cat.desc || '';
  });
  renderPreview();
}

// ========== Build category UI ==========
function buildCatUI() {
  var list = document.getElementById('catList');
  list.innerHTML = '';
  state.categories.forEach(function(cat, i) {
    var sec = document.createElement('div');
    sec.className = 'cat-section';
    sec.style.borderLeftColor = cat.color;

    var header = document.createElement('div');
    header.className = 'cat-header';
    header.onclick = (function(idx) { return function() { toggleCat(idx); }; })(i);

    var arrow = document.createElement('span');
    arrow.className = 'arrow';
    arrow.id = 'arrow_' + i;
    arrow.textContent = '▶';

    var colorInput = document.createElement('input');
    colorInput.type = 'color';
    colorInput.value = cat.color;
    colorInput.style.cssText = 'width:28px;height:28px;padding:1px;border-radius:6px;';
    colorInput.onchange = (function(idx) { return function() {
      state.categories[idx].color = this.value;
      this.closest('.cat-section').style.borderLeftColor = this.value;
      renderPreview();
    }; })(i);

    var nameInput = document.createElement('input');
    nameInput.type = 'text';
    nameInput.value = cat.name;
    nameInput.style.cssText = 'flex:1;';
    nameInput.oninput = (function(idx) { return function() {
      state.categories[idx].name = this.value;
      renderPreview();
    }; })(i);

    var delBtn = document.createElement('button');
    delBtn.className = 'del-cat';
    delBtn.textContent = '✕';
    delBtn.onclick = (function(idx) { return function(e) {
      e.stopPropagation();
      delCat(idx);
    }; })(i);

    header.appendChild(arrow);
    header.appendChild(colorInput);
    header.appendChild(nameInput);
    header.appendChild(delBtn);

    var body = document.createElement('div');
    body.className = 'cat-body';
    body.id = 'catBody_' + i;

    var descLabel = document.createElement('label');
    descLabel.style.marginTop = '4px';
    descLabel.textContent = '分类描述文案';

    var descTA = document.createElement('textarea');
    descTA.id = 'catDesc_' + i;
    descTA.value = cat.desc || '';
    descTA.oninput = (function(idx) { return function() {
      state.categories[idx].desc = this.value;
      renderPreview();
    }; })(i);

    var chipLabel = document.createElement('label');
    chipLabel.textContent = 'APP选择 (左键切换，右键设首推)';

    var chipDiv = document.createElement('div');
    chipDiv.className = 'app-chips';
    chipDiv.id = 'appChips_' + i;

    body.appendChild(descLabel);
    body.appendChild(descTA);
    body.appendChild(chipLabel);
    body.appendChild(chipDiv);

    sec.appendChild(header);
    sec.appendChild(body);
    list.appendChild(sec);
    buildAppChips(i);
  });
}

function toggleCat(i) {
  var body = document.getElementById('catBody_' + i);
  var arrow = document.getElementById('arrow_' + i);
  body.classList.toggle('show');
  arrow.classList.toggle('open');
}

function buildAppChips(catIdx) {
  var container = document.getElementById('appChips_' + catIdx);
  if (!container) return;
  container.innerHTML = '';
  var cat = state.categories[catIdx];
  ALL_APP_KEYS.forEach(function(key) {
    var sel = cat.apps.indexOf(key) >= 0;
    var isF = cat.featured === key;
    var chip = document.createElement('span');
    chip.className = 'app-chip' + (sel ? ' selected' : '');
    chip.innerHTML = APP_NAMES[key] + (isF ? '<span class="star">⭐</span>' : '');
    chip.onclick = function() {
      var idx = cat.apps.indexOf(key);
      if (idx >= 0) {
        if (cat.featured === key) cat.featured = '';
        cat.apps.splice(idx, 1);
      } else {
        cat.apps.push(key);
        if (!cat.featured) cat.featured = key;
      }
      buildAppChips(catIdx);
      renderPreview();
    };
    chip.oncontextmenu = function(e) {
      e.preventDefault();
      if (cat.apps.indexOf(key) >= 0) {
        cat.featured = key;
        buildAppChips(catIdx);
        renderPreview();
      }
    };
    chip.title = '左键切换选中，右键设为首推';
    container.appendChild(chip);
  });
}

function addCategory() {
  state.categories.push({name:'新分类',color:'#ff6b9d',apps:['yumian'],featured:'yumian',desc:''});
  buildCatUI();
  renderPreview();
}

function delCat(i) {
  state.categories.splice(i, 1);
  buildCatUI();
  renderPreview();
}

// ========== Render Preview ==========
function renderPreview() {
  state.title = document.getElementById('titleInput').value;
  state.subtitle = document.getElementById('subtitleInput').value;
  state.bgColor = document.getElementById('bgColor').value;
  var area = document.getElementById('previewArea');
  area.innerHTML = '<div class="canvas-wrapper" id="canvasWrap"></div>';
  document.getElementById('canvasWrap').innerHTML = buildCardHTML();
}

function buildCardHTML() {
  var bg = state.bgColor;
  var dark = isColorDark(bg);
  var tc = dark ? '#ffffff' : '#1a1a1a';
  var stc = dark ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.6)';
  var catsHTML = '';
  state.categories.forEach(function(cat) {
    var appsHTML = '';
    var aw = cat.apps.length > 5 ? '60' : '72';
    var as = cat.apps.length > 5 ? '44' : '52';
    var br = cat.apps.length > 5 ? '12' : '14';
    var fs = cat.apps.length > 5 ? '10' : '11';
    cat.apps.forEach(function(appKey) {
      var logo = APP_LOGOS[appKey] || '';
      var name = APP_NAMES[appKey] || appKey;
      var isF = cat.featured === appKey;
      appsHTML += '<div style="display:flex;flex-direction:column;align-items:center;width:' + aw + 'px;">'
        + '<div style="position:relative;">'
        + '<img src="' + logo + '" style="width:' + as + 'px;height:' + as + 'px;border-radius:' + br + 'px;object-fit:cover;">'
        + (isF ? '<div style="position:absolute;top:-4px;right:-4px;background:#f1c40f;color:#000;font-size:9px;padding:1px 4px;border-radius:6px;font-weight:700;">首推</div>' : '')
        + '</div>'
        + '<div style="font-size:' + fs + 'px;margin-top:3px;color:' + tc + ';text-align:center;">' + name + '</div>'
        + '</div>';
    });
    catsHTML += '<div style="background:' + hexToRgba(cat.color, 0.12) + ';border-radius:14px;padding:12px 14px;border:1px solid ' + hexToRgba(cat.color, 0.3) + ';">'
      + '<div style="display:flex;align-items:center;gap:8px;margin-bottom:' + (cat.desc ? '4' : '8') + 'px;">'
      + '<div style="width:6px;height:22px;background:' + cat.color + ';border-radius:3px;"></div>'
      + '<span style="font-size:16px;font-weight:700;color:' + cat.color + ';">' + cat.name + '</span>'
      + (cat.desc ? '<span style="font-size:11px;color:' + stc + ';margin-left:auto;">' + cat.desc + '</span>' : '')
      + '</div>'
      + '<div style="display:flex;gap:8px;justify-content:flex-start;flex-wrap:wrap;">'
      + appsHTML
      + '</div>'
      + '</div>';
  });
  return '<div style="width:1242px;height:1656px;background:' + bg + ';padding:48px 40px;display:flex;flex-direction:column;font-family:sans-serif;overflow:hidden;">'
    + '<div style="text-align:center;margin-bottom:28px;">'
    + '<div style="font-size:42px;font-weight:800;color:' + tc + ';letter-spacing:2px;line-height:1.3;">' + state.title + '</div>'
    + '<div style="font-size:20px;color:' + stc + ';margin-top:8px;">' + state.subtitle + '</div>'
    + '<div style="width:80px;height:4px;background:linear-gradient(90deg,#ff6b9d,#c44dff);margin:14px auto 0;border-radius:2px;"></div>'
    + '</div>'
    + '<div style="flex:1;display:flex;flex-direction:column;gap:10px;overflow:hidden;">'
    + catsHTML
    + '</div>'
    + '<div style="text-align:center;margin-top:16px;padding-top:12px;border-top:1px solid ' + (dark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)') + ';">'
    + '<div style="font-size:12px;color:' + stc + ';">⭐ 首推标记为该分类最推荐的软件</div>'
    + '</div>'
    + '</div>';
}

// ========== Export ==========
async function exportPNG() {
  renderPreview();
  var el = document.getElementById('canvasWrap').firstElementChild;
  if (!el) { alert('请先生成预览'); return; }
  var exp = document.getElementById('exportContainer');
  exp.innerHTML = el.outerHTML;
  var clone = exp.firstElementChild;
  clone.style.transform = 'none';
  try {
    var canvas = await html2canvas(clone, {
      width: 1242, height: 1656,
      scale: 1,
      useCORS: true,
      backgroundColor: state.bgColor,
      allowTaint: true
    });
    var link = document.createElement('a');
    link.download = '社交分类推荐_' + Date.now() + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch(e) {
    alert('导出失败: ' + e.message);
  }
  exp.innerHTML = '';
}

// ========== Utils ==========
function hexToRgba(hex, alpha) {
  var r = parseInt(hex.slice(1,3),16);
  var g = parseInt(hex.slice(3,5),16);
  var b = parseInt(hex.slice(5,7),16);
  return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
}

function isColorDark(hex) {
  var r = parseInt(hex.slice(1,3),16);
  var g = parseInt(hex.slice(3,5),16);
  var b = parseInt(hex.slice(5,7),16);
  return (r*299 + g*587 + b*114) / 1000 < 128;
}

// ========== Init ==========
loadTemplate(0);
