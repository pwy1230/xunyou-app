<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>寻尤管理后台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
.login-box{background:#0f0f23;border-radius:20px;padding:40px 36px;width:90%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,0.5)}
.logo{text-align:center;margin-bottom:32px}
.logo-icon{width:64px;height:64px;background:linear-gradient(135deg,#ff6b9d,#c44dff);border-radius:16px;display:inline-flex;align-items:center;justify-content:center;font-size:32px;margin-bottom:12px}
.logo h1{color:#fff;font-size:22px;font-weight:700}
.logo p{color:#888;font-size:13px;margin-top:4px}
.form-group{margin-bottom:20px}
.form-group label{display:block;color:#aaa;font-size:13px;margin-bottom:8px}
.form-group input{width:100%;background:#1a1a2e;border:1px solid #2a2a4a;color:#e0e0e0;padding:14px 16px;border-radius:12px;font-size:15px;transition:border-color 0.3s}
.form-group input:focus{outline:none;border-color:#ff6b9d}
.form-group input::placeholder{color:#555}
.btn-login{width:100%;padding:15px;border-radius:12px;border:none;background:linear-gradient(135deg,#ff6b9d,#c44dff);color:#fff;font-size:16px;font-weight:600;cursor:pointer;transition:transform 0.2s,box-shadow 0.2s}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(255,107,157,0.4)}
.btn-login:active{transform:translateY(0)}
.error-msg{background:rgba(255,71,87,0.15);border:1px solid rgba(255,71,87,0.3);color:#ff4757;padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:20px;display:none;text-align:center}
.footer{text-align:center;margin-top:24px;color:#555;font-size:12px}
</style>
</head>
<body>
<div class="login-box">
    <div class="logo">
        <div class="logo-icon">✨</div>
        <h1>寻尤管理后台</h1>
        <p>管理员登录</p>
    </div>
    
    <div class="error-msg" id="errorMsg"></div>
    
    <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
            <label>管理员账号</label>
            <input type="text" id="username" placeholder="请输入账号" required>
        </div>
        <div class="form-group">
            <label>登录密码</label>
            <input type="password" id="password" placeholder="请输入密码" required>
        </div>
        <button type="submit" class="btn-login">登 录</button>
    </form>
    
    <div class="footer">© 2024 寻尤 All Rights Reserved</div>
</div>

<script>
function handleLogin(e){
    e.preventDefault();
    var username = document.getElementById('username').value.trim();
    var password = document.getElementById('password').value;
    var errorMsg = document.getElementById('errorMsg');
    
    fetch('/admin/login',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({username:username,password:password}),
        credentials:'same-origin'
    }).then(r=>r.json()).then(d=>{
        if(d.ok){
            location.href='/admin';
        } else {
            errorMsg.textContent = d.error || '登录失败';
            errorMsg.style.display = 'block';
        }
    }).catch(function(){
        errorMsg.textContent = '网络错误，请重试';
        errorMsg.style.display = 'block';
    });
}
</script>
</body>
</html>
