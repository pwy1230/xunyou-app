<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>寻尤 - 注册</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a1a;
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 400px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            text-align: center;
            padding: 40px 0 30px;
        }
        
        .logo {
            font-size: 36px;
            font-weight: 900;
            background: linear-gradient(135deg, #ff6b9d, #c44dff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }
        
        .subtitle {
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            letter-spacing: 3px;
        }
        
        .progress-bar {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin: 20px 0 30px;
        }
        
        .progress-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            transition: all 0.3s ease;
        }
        
        .progress-dot.active {
            background: linear-gradient(135deg, #ff6b9d, #c44dff);
            width: 24px;
            border-radius: 4px;
        }
        
        .progress-dot.completed {
            background: #4facfe;
        }
        
        .step-container {
            flex: 1;
            display: none;
            animation: fadeIn 0.3s ease;
        }
        
        .step-container.active {
            display: block;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .step-title {
            font-size: 24px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 8px;
        }
        
        .step-desc {
            font-size: 14px;
            color: rgba(255,255,255,0.5);
            text-align: center;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            font-size: 13px;
            color: rgba(255,255,255,0.6);
            margin-bottom: 8px;
            display: block;
        }
        
        .form-input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }
        
        .form-input::placeholder {
            color: rgba(255,255,255,0.3);
        }
        
        .form-input:focus {
            border-color: #ff6b9d;
            box-shadow: 0 0 20px rgba(255,107,157,0.2);
        }
        
        .form-input.error {
            border-color: #ff4d4d;
        }
        
        .error-msg {
            color: #ff4d4d;
            font-size: 12px;
            margin-top: 6px;
            display: none;
        }
        
        .error-msg.show {
            display: block;
        }
        
        .gender-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-top: 20px;
        }
        
        .gender-card {
            padding: 30px 20px;
            background: rgba(255,255,255,0.04);
            border: 2px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .gender-card:hover {
            border-color: rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }
        
        .gender-card.selected.male {
            border-color: #4facfe;
            background: rgba(79,172,254,0.1);
        }
        
        .gender-card.selected.female {
            border-color: #ff6b9d;
            background: rgba(255,107,157,0.1);
        }
        
        .gender-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        
        .gender-card.male .gender-icon { color: #4facfe; }
        .gender-card.female .gender-icon { color: #ff6b9d; }
        
        .gender-text {
            font-size: 16px;
            font-weight: 500;
        }
        
        .gender-desc {
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            margin-top: 6px;
        }
        
        .date-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
        }
        
        .date-select {
            padding: 16px 12px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            color: white;
            font-size: 16px;
            outline: none;
            appearance: none;
            text-align: center;
        }
        
        .date-select:focus {
            border-color: #ff6b9d;
        }
        
        .date-select option {
            background: #1a1a2e;
            color: white;
        }
        
        .avatar-upload-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 30px 0;
        }
        
        .avatar-preview {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(255,255,255,0.06);
            border: 3px dashed rgba(255,255,255,0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            overflow: hidden;
        }
        
        .avatar-preview:hover {
            border-color: #ff6b9d;
            border-style: solid;
        }
        
        .avatar-preview.has-avatar {
            border: 3px solid #ff6b9d;
            border-style: solid;
        }
        
        .avatar-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .avatar-preview i {
            font-size: 36px;
            color: rgba(255,255,255,0.3);
        }
        
        .avatar-hint {
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            margin-top: 16px;
            text-align: center;
        }
        
        .avatar-hint.required {
            color: #ff6b9d;
        }
        
        #avatar-input {
            display: none;
        }
        
        .btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #ff6b9d, #c44dff);
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
            box-shadow: 0 10px 30px rgba(255,107,157,0.3);
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(255,107,157,0.4);
        }
        
        .btn:active {
            transform: scale(0.98);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-secondary {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: none;
            margin-top: 12px;
        }
        
        .btn-secondary:hover {
            background: rgba(255,255,255,0.05);
            box-shadow: none;
        }
        
        .back-link {
            text-align: center;
            margin-top: 30px;
        }
        
        .back-link a {
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            font-size: 14px;
        }
        
        .back-link a:hover {
            color: #ff6b9d;
        }
        
        .tip-box {
            background: rgba(79,172,254,0.1);
            border: 1px solid rgba(79,172,254,0.3);
            border-radius: 12px;
            padding: 16px;
            margin: 20px 0;
            font-size: 13px;
            color: #4facfe;
        }
        
        .loading {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10,10,26,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        
        .loading.show {
            display: flex;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #ff6b9d;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading-text {
            margin-top: 20px;
            color: rgba(255,255,255,0.7);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo"><img src="/static/logo.png" style="width:40px;height:40px;border-radius:10px;vertical-align:middle;margin-right:6px;">寻尤</div>
            <div class="subtitle">真诚社交 · 遇见缘分</div>
        </div>
        
        <div class="progress-bar">
            <div class="progress-dot" data-step="1"></div>
            <div class="progress-dot" data-step="2"></div>
            <div class="progress-dot" data-step="3"></div>
            <div class="progress-dot" data-step="4"></div>
            <div class="progress-dot" data-step="5"></div>
            <div class="progress-dot" data-step="6"></div>
        </div>
        
        <!-- 步骤1: 手机号 + 密码 -->
        <div class="step-container active" data-step="1">
            <div class="step-title">创建账号</div>
            <div class="step-desc">请输入您的手机号和密码</div>
            
            <div class="form-group">
                <label class="form-label">手机号</label>
                <input type="tel" class="form-input" id="phone" placeholder="请输入11位手机号" maxlength="11">
                <div class="error-msg" id="phone-error">请输入正确的11位手机号</div>
            </div>
            
            <div class="form-group">
                <label class="form-label">密码</label>
                <input type="password" class="form-input" id="password" placeholder="请输入密码（至少6位）">
                <div class="error-msg" id="password-error">密码至少6位</div>
            </div>
            
            <div class="form-group">
                <label class="form-label">确认密码</label>
                <input type="password" class="form-input" id="confirm-password" placeholder="请再次输入密码">
                <div class="error-msg" id="confirm-error">两次密码输入不一致</div>
            </div>
            
            <button class="btn" id="step1-btn">下一步</button>
        </div>
        
        <!-- 步骤2: 性别选择 -->
        <div class="step-container" data-step="2">
            <div class="step-title">选择性别</div>
            <div class="step-desc">您的性别将被用于匹配推荐</div>
            
            <div class="gender-grid">
                <div class="gender-card male" data-gender="male">
                    <div class="gender-icon"><i class="fas fa-mars"></i></div>
                    <div class="gender-text">男生</div>
                    <div class="gender-desc">探索有趣的灵魂</div>
                </div>
                <div class="gender-card female" data-gender="female">
                    <div class="gender-icon"><i class="fas fa-venus"></i></div>
                    <div class="gender-text">女生</div>
                    <div class="gender-desc">遇见命中注定</div>
                </div>
            </div>
            <div class="error-msg" id="gender-error" style="text-align:center;margin-top:20px;">请选择您的性别</div>
            
            <button class="btn" id="step2-btn" disabled>下一步</button>
            <button class="btn btn-secondary" id="step2-back">上一步</button>
        </div>
        
        <!-- 步骤3: 昵称 -->
        <div class="step-container" data-step="3">
            <div class="step-title">设置昵称</div>
            <div class="step-desc">起一个好听的名字吧</div>
            
            <div class="form-group">
                <label class="form-label">昵称</label>
                <input type="text" class="form-input" id="nickname" placeholder="请输入昵称（2-12字）" maxlength="12">
                <div class="error-msg" id="nickname-error">昵称长度2-12字</div>
            </div>
            
            <button class="btn" id="step3-btn" disabled>下一步</button>
            <button class="btn btn-secondary" id="step3-back">上一步</button>
        </div>
        
        <!-- 步骤4: 出生日期 -->
        <div class="step-container" data-step="4">
            <div class="step-title">出生日期</div>
            <div class="step-desc">我们将根据年龄为您推荐合适的人</div>
            
            <div class="tip-box">
                <i class="fas fa-info-circle"></i> 必须年满18岁才能注册寻尤
            </div>
            
            <div class="form-group">
                <label class="form-label">选择出生日期</label>
                <div class="date-row">
                    <select class="date-select" id="birth-year">
                        <option value="">年</option>
                    </select>
                    <select class="date-select" id="birth-month">
                        <option value="">月</option>
                    </select>
                    <select class="date-select" id="birth-day">
                        <option value="">日</option>
                    </select>
                </div>
                <div class="error-msg" id="birthday-error">请选择完整的出生日期</div>
            </div>
            
            <button class="btn" id="step4-btn" disabled>下一步</button>
            <button class="btn btn-secondary" id="step4-back">上一步</button>
        </div>
        
        <!-- 步骤5: 城市 -->
        <div class="step-container" data-step="5">
            <div class="step-title">所在城市</div>
            <div class="step-desc">帮助您找到同城的人</div>
            
            <div class="form-group">
                <label class="form-label">城市</label>
                <input type="text" class="form-input" id="city" placeholder="请输入您所在的城市">
                <div class="error-msg" id="city-error">请输入城市名称</div>
            </div>
            
            <button class="btn" id="step5-btn" disabled>下一步</button>
            <button class="btn btn-secondary" id="step5-back">上一步</button>
        </div>
        
        <!-- 步骤6: 上传头像 -->
        <div class="step-container" data-step="6">
            <div class="step-title">上传头像</div>
            <div class="step-desc" id="avatar-desc">上传您的照片，展示真实自我</div>
            
            <div class="avatar-upload-area">
                <div class="avatar-preview" id="avatar-preview">
                    <i class="fas fa-camera"></i>
                </div>
                <input type="file" id="avatar-input" accept="image/*">
                <div class="avatar-hint" id="avatar-hint">点击上传头像</div>
            </div>
            
            <button class="btn" id="step6-btn" disabled>完成注册</button>
            <button class="btn btn-secondary" id="step6-back">上一步</button>
        </div>
        
        <div class="back-link">
            <a href="/login">已有账号？立即登录</a>
        </div>
    </div>
    
    <!-- 加载动画 -->
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <div class="loading-text">正在注册...</div>
    </div>
    
    
        <script>
        document.addEventListener('DOMContentLoaded', function() {
            let currentStep = 1;
            let formData = {
                phone: '',
                password: '',
                gender: '',
                nickname: '',
                birthday: '',
                city: '',
                avatar: ''
            };
            
            // Helper: get element by id
            function $(sel) {
                if (sel.startsWith('#')) {
                    return document.getElementById(sel.substring(1));
                }
                return document.querySelector(sel);
            }
            
            // Helper: get all elements
            function $$(sel) {
                return document.querySelectorAll(sel);
            }
            
            // Helper: add/remove/toggle class on element(s)
            function addClass(el, cls) {
                if (el) el.classList.add(...cls.split(' '));
            }
            function removeClass(el, cls) {
                if (el) el.classList.remove(...cls.split(' '));
            }
            
            // 初始化日期选择器
            function initDateSelectors() {
                const yearSelect = document.getElementById('birth-year');
                const monthSelect = document.getElementById('birth-month');
                const daySelect = document.getElementById('birth-day');
                
                const currentYear = new Date().getFullYear();
                
                // 年份
                for (let y = currentYear - 18; y >= currentYear - 80; y--) {
                    const opt = document.createElement('option');
                    opt.value = y;
                    opt.textContent = y + '年';
                    yearSelect.appendChild(opt);
                }
                
                // 月份
                for (let m = 1; m <= 12; m++) {
                    const opt = document.createElement('option');
                    opt.value = m;
                    opt.textContent = m + '月';
                    monthSelect.appendChild(opt);
                }
                
                // 日期
                function updateDays() {
                    const year = parseInt(yearSelect.value);
                    const month = parseInt(monthSelect.value);
                    daySelect.innerHTML = '<option value="">日</option>';
                    
                    if (year && month) {
                        const days = new Date(year, month, 0).getDate();
                        for (let d = 1; d <= days; d++) {
                            const opt = document.createElement('option');
                            opt.value = d;
                            opt.textContent = d + '日';
                            daySelect.appendChild(opt);
                        }
                    }
                }
                
                yearSelect.addEventListener('change', updateDays);
                monthSelect.addEventListener('change', updateDays);
            }
            
            initDateSelectors();
            
            // 更新进度条
            function updateProgress(step) {
                document.querySelectorAll('.progress-dot').forEach(function(dot) {
                    const dotStep = parseInt(dot.dataset.step);
                    dot.classList.remove('active', 'completed');
                    if (dotStep < step) {
                        dot.classList.add('completed');
                    } else if (dotStep === step) {
                        dot.classList.add('active');
                    }
                });
            }
            
            // 显示步骤
            function showStep(step) {
                document.querySelectorAll('.step-container').forEach(function(el) {
                    el.classList.remove('active');
                });
                var target = document.querySelector('.step-container[data-step="' + step + '"]');
                if (target) target.classList.add('active');
                updateProgress(step);
                currentStep = step;
            }
            
            // 验证步骤1
            function validateStep1() {
                const phone = document.getElementById('phone').value;
                const password = document.getElementById('password').value;
                const confirm = document.getElementById('confirm-password').value;
                
                let valid = true;
                
                if (!/^1\d{10}$/.test(phone)) {
                    document.getElementById('phone').classList.add('error');
                    document.getElementById('phone-error').classList.add('show');
                    valid = false;
                } else {
                    document.getElementById('phone').classList.remove('error');
                    document.getElementById('phone-error').classList.remove('show');
                }
                
                if (password.length < 6) {
                    document.getElementById('password').classList.add('error');
                    document.getElementById('password-error').classList.add('show');
                    valid = false;
                } else {
                    document.getElementById('password').classList.remove('error');
                    document.getElementById('password-error').classList.remove('show');
                }
                
                if (password !== confirm || confirm.length < 6) {
                    document.getElementById('confirm-password').classList.add('error');
                    document.getElementById('confirm-error').classList.add('show');
                    valid = false;
                } else {
                    document.getElementById('confirm-password').classList.remove('error');
                    document.getElementById('confirm-error').classList.remove('show');
                }
                
                return valid;
            }
            
            // 步骤1下一步
            document.getElementById('step1-btn').addEventListener('click', function() {
                if (validateStep1()) {
                    formData.phone = document.getElementById('phone').value;
                    formData.password = document.getElementById('password').value;
                    formData.confirm_password = document.getElementById('confirm-password').value;
                    showStep(2);
                }
            });
            
            // 性别选择
            document.querySelectorAll('.gender-card').forEach(function(card) {
                card.addEventListener('click', function() {
                    document.querySelectorAll('.gender-card').forEach(function(c) {
                        c.classList.remove('selected');
                    });
                    this.classList.add('selected');
                    formData.gender = this.dataset.gender;
                    document.getElementById('gender-error').classList.remove('show');
                    document.getElementById('step2-btn').disabled = false;
                    
                    // 更新步骤6提示
                    var avatarHint = document.getElementById('avatar-hint');
                    var avatarDesc = document.getElementById('avatar-desc');
                    if (formData.gender === 'female') {
                        avatarHint.classList.add('required');
                        avatarHint.textContent = '女生必须上传头像';
                        avatarDesc.textContent = '上传您的照片，展示真实自我';
                    } else {
                        avatarHint.classList.remove('required');
                        avatarHint.textContent = '上传头像（可选）';
                        avatarDesc.textContent = '上传头像可以增加可信度';
                    }
                });
            });
            
            // 步骤2按钮
            document.getElementById('step2-btn').addEventListener('click', function() {
                if (formData.gender) {
                    showStep(3);
                }
            });
            
            // 昵称验证
            document.getElementById('nickname').addEventListener('input', function() {
                const val = this.value.trim();
                if (val.length >= 2 && val.length <= 12) {
                    this.classList.remove('error');
                    document.getElementById('nickname-error').classList.remove('show');
                    document.getElementById('step3-btn').disabled = false;
                    formData.nickname = val;
                } else {
                    this.classList.add('error');
                    document.getElementById('nickname-error').classList.add('show');
                    document.getElementById('step3-btn').disabled = true;
                }
            });
            
            // 步骤3按钮
            document.getElementById('step3-btn').addEventListener('click', function() {
                showStep(4);
            });
            
            // 日期验证
            function validateBirthday() {
                const year = document.getElementById('birth-year').value;
                const month = document.getElementById('birth-month').value;
                const day = document.getElementById('birth-day').value;
                
                if (year && month && day) {
                    formData.birthday = year + '-' + String(month).padStart(2, '0') + '-' + String(day).padStart(2, '0');
                    
                    const birthDate = new Date(formData.birthday);
                    const today = new Date();
                    let age = today.getFullYear() - birthDate.getFullYear();
                    const m = today.getMonth() - birthDate.getMonth();
                    if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) {
                        age--;
                    }
                    
                    if (age < 18) {
                        var berr = document.getElementById('birthday-error');
                        berr.textContent = '必须年满18岁才能注册';
                        berr.classList.add('show');
                        return false;
                    }
                    
                    document.getElementById('birthday-error').classList.remove('show');
                    return true;
                }
                return false;
            }
            
            ['birth-year', 'birth-month', 'birth-day'].forEach(function(id) {
                document.getElementById(id).addEventListener('change', function() {
                    if (validateBirthday()) {
                        document.getElementById('step4-btn').disabled = false;
                    } else {
                        document.getElementById('step4-btn').disabled = true;
                    }
                });
            });
            
            // 步骤4按钮
            document.getElementById('step4-btn').addEventListener('click', function() {
                showStep(5);
            });
            
            // 城市验证
            document.getElementById('city').addEventListener('input', function() {
                const val = this.value.trim();
                if (val.length >= 2) {
                    this.classList.remove('error');
                    document.getElementById('city-error').classList.remove('show');
                    document.getElementById('step5-btn').disabled = false;
                    formData.city = val;
                } else {
                    this.classList.add('error');
                    document.getElementById('city-error').classList.add('show');
                    document.getElementById('step5-btn').disabled = true;
                }
            });
            
            // 步骤5按钮
            document.getElementById('step5-btn').addEventListener('click', function() {
                showStep(6);
            });
            
            // 头像上传
            document.getElementById('avatar-preview').addEventListener('click', function() {
                document.getElementById('avatar-input').click();
            });
            
            document.getElementById('avatar-input').addEventListener('change', function() {
                const file = this.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        var preview = document.getElementById('avatar-preview');
                        preview.innerHTML = '<img src="' + e.target.result + '">';
                        preview.classList.add('has-avatar');
                        formData.avatar = e.target.result;
                        document.getElementById('step6-btn').disabled = false;
                    };
                    reader.readAsDataURL(file);
                }
            });
            
            // 步骤6提交
            document.getElementById('step6-btn').addEventListener('click', function() {
                if (formData.gender === 'female' && !formData.avatar) {
                    alert('请上传头像');
                    return;
                }
                
                document.getElementById('loading').classList.add('show');
                
                fetch('/api/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(formData)
                }).then(function(res) { return res.json(); }).then(function(res) {
                    if (res.success) {
                        if (res.need_vip) {
                            window.location.href = '/vip';
                        } else {
                            window.location.href = '/home';
                        }
                    } else {
                        document.getElementById('loading').classList.remove('show');
                        alert(res.message);
                    }
                }).catch(function() {
                    document.getElementById('loading').classList.remove('show');
                    alert('注册失败，请稍后重试');
                });
            });
            
            // 返回按钮
            ['step2-back', 'step3-back', 'step4-back', 'step5-back', 'step6-back'].forEach(function(id) {
                var btn = document.getElementById(id);
                if (btn) {
                    btn.addEventListener('click', function() {
                        var container = this.closest('.step-container');
                        if (container) {
                            var step = parseInt(container.dataset.step);
                            showStep(step - 1);
                        }
                    });
                }
            });
            
            // 输入框回车事件
            ['phone', 'password', 'confirm-password'].forEach(function(id) {
                document.getElementById(id).addEventListener('keypress', function(e) {
                    if (e.which === 13) {
                        document.getElementById('step1-btn').click();
                    }
                });
            });
            
            document.getElementById('nickname').addEventListener('keypress', function(e) {
                if (e.which === 13) {
                    document.getElementById('step3-btn').click();
                }
            });
            
            document.getElementById('city').addEventListener('keypress', function(e) {
                if (e.which === 13) {
                    document.getElementById('step5-btn').click();
                }
            });
        });
    </script>
</body>
</html>
