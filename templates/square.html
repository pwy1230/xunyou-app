{% extends "base.html" %}

{% block title %}寻尤 - 动态广场{% endblock %}

{% block extra_css %}
<style>
.square-page {
    height: 100vh;
    display: flex;
    flex-direction: column;
}

.square-header {
    padding: 16px 20px;
    background: var(--bg-secondary);
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.square-title {
    font-size: 20px;
    font-weight: 700;
}

.square-actions {
    display: flex;
    gap: 16px;
}

.square-actions button {
    background: none;
    border: none;
    color: var(--text-primary);
    font-size: 20px;
    cursor: pointer;
}

.square-sort {
    padding: 12px 16px;
    background: var(--bg-secondary);
    display: flex;
    gap: 16px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

.sort-btn {
    padding: 6px 12px;
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 14px;
    cursor: pointer;
    position: relative;
}

.sort-btn.active {
    color: var(--accent);
}

.sort-btn.active::after {
    content: '';
    position: absolute;
    bottom: -12px;
    left: 50%;
    transform: translateX(-50%);
    width: 20px;
    height: 2px;
    background: var(--accent);
    border-radius: 1px;
}

.post-create-bar {
    padding: 12px 16px;
    background: var(--bg-card);
    margin: 12px;
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
}

.post-create-bar .avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    overflow: hidden;
}

.post-create-bar .placeholder {
    flex: 1;
    padding: 10px 16px;
    background: var(--bg-input);
    border-radius: 20px;
    color: var(--text-muted);
    font-size: 14px;
}

.post-modal {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.8);
    z-index: 2000;
    display: none;
}

.post-modal.active {
    display: block;
}

.post-modal-content {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--bg-card);
    border-radius: var(--radius) var(--radius) 0 0;
    max-height: 90vh;
    overflow-y: auto;
}

.post-modal-header {
    padding: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

.post-modal-header h3 {
    font-size: 17px;
}

.post-modal-header button {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 20px;
    cursor: pointer;
}

.post-modal-body {
    padding: 16px;
}

.post-content-input {
    width: 100%;
    min-height: 120px;
    background: var(--bg-input);
    border: none;
    border-radius: var(--radius-sm);
    padding: 14px;
    color: var(--text-primary);
    font-size: 15px;
    resize: none;
    margin-bottom: 16px;
}

.post-content-input:focus {
    outline: none;
}

.post-images-preview {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 16px;
}

.post-images-preview .preview-item {
    aspect-ratio: 1;
    border-radius: 8px;
    overflow: hidden;
    position: relative;
}

.post-images-preview .preview-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.post-images-preview .preview-item .remove-btn {
    position: absolute;
    top: 4px;
    right: 4px;
    width: 20px;
    height: 20px;
    background: rgba(0,0,0,0.6);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 12px;
    cursor: pointer;
}

.post-images-preview .add-btn {
    aspect-ratio: 1;
    border-radius: 8px;
    border: 1px dashed var(--text-muted);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 24px;
}

.post-modal-footer {
    padding: 16px;
    display: flex;
    gap: 12px;
}

.post-modal-footer .btn {
    flex: 1;
}

.post-image-grid {
    display: grid;
    gap: 2px;
}

.post-image-grid img {
    width: 100%;
    display: block;
}

.post-image-grid.one img { grid-template-columns: 1fr; }

/* 动态配图样式 */
.post-images {
    display: grid;
    gap: 4px;
    margin: 8px 0;
    border-radius: 8px;
    overflow: hidden;
}
.post-images.one-image {
    grid-template-columns: 1fr;
    max-width: 200px;
}
.post-images.one-image img {
    width: 100%;
    max-height: 200px;
    object-fit: cover;
    border-radius: 8px;
}
.post-images.two-images {
    grid-template-columns: repeat(2, 1fr);
}
.post-images.two-images img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
}
.post-images.three-images {
    grid-template-columns: repeat(3, 1fr);
}
.post-images.three-images img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
}

        /* square.html - 粉紫主题 */
        .fab { box-shadow: 0 4px 15px rgba(255,107,157,0.3); }
        .action-btn.liked { color: #ff6b9d; }
    
</style>
{% endblock %}

{% block body %}
<div class="square-page">
    <div class="square-header">
        <div class="square-title">动态广场</div>
        <div class="square-actions">
            <button onclick="location.href='/square'"><i class="fas fa-sync-alt"></i></button>
        </div>
    </div>
    
    <div class="square-sort">
        <button class="sort-btn active" data-sort="hot">🔥 热门</button>
        <button class="sort-btn" data-sort="new">✨ 最新</button>
    </div>
    
    <div class="main-content" style="padding-bottom:70px;">
        <div id="postList">
            <div class="loading">
                <div class="loading-spinner"></div>
            </div>
        </div>
    </div>
    
    <div class="post-create-bar" onclick="openPostModal()">
        <div class="avatar">
            {% if current_user.avatar %}
            <img src="{{ current_user.avatar }}" alt="">
            {% else %}
            <div style="width:100%;height:100%;background:var(--bg-input);display:flex;align-items:center;justify-content:center;">
                <i class="fas fa-user" style="color:var(--text-muted);"></i>
            </div>
            {% endif %}
        </div>
        <div class="placeholder">分享你的此刻...</div>
    </div>
    
    {% include 'tabbar.html' %}
</div>

<!-- 发布动态弹窗 -->
<div class="post-modal" id="postModal">
    <div class="post-modal-content">
        <div class="post-modal-header">
            <h3>发布动态</h3>
            <button onclick="closePostModal()"><i class="fas fa-times"></i></button>
        </div>
        <div class="post-modal-body">
            <textarea class="post-content-input" id="postContent" placeholder="分享你的此刻..."></textarea>
            <div class="post-images-preview" id="imagesPreview">
                <div class="add-btn" onclick="document.getElementById('postImages').click()">
                    <i class="fas fa-plus"></i>
                </div>
            </div>
            <input type="file" id="postImages" multiple accept="image/*" style="display:none;" onchange="handleImageSelect(this)">
        </div>
        <div class="post-modal-footer">
            <button class="btn btn-secondary" onclick="closePostModal()">取消</button>
            <button class="btn btn-primary" onclick="submitPost()">发布</button>
        </div>
    </div>
</div>

<script>
let currentSort = 'hot';
let posts = [];
let selectedImages = [];

function timeAgo(dateStr) {
    if (!dateStr) return '';
    const now = new Date();
    const date = new Date(dateStr);
    const diff = Math.floor((now - date) / 1000);
    if (diff < 60) return '刚刚';
    if (diff < 3600) return Math.floor(diff / 60) + '分钟前';
    if (diff < 86400) return Math.floor(diff / 3600) + '小时前';
    if (diff < 2592000) return Math.floor(diff / 86400) + '天前';
    return dateStr.substring(0, 10);
}

async function loadPosts() {
    try {
    const response = await api(`/api/posts?sort=${currentSort}`);
    const container = document.getElementById('postList');
    
    if (!response.success || !response.posts || response.posts.length === 0) {
        container.innerHTML = `
            <div class="empty-state" style="margin-top:60px;">
                <div class="empty-state-icon">📷</div>
                <div class="empty-state-title">还没有动态</div>
                <div class="empty-state-text">成为第一个发布的人吧~</div>
            </div>
        `;
        return;
    }
    
    posts = response.posts;
    container.innerHTML = posts.map(post => renderPostCard(post)).join('');
    } catch(e) { console.error('loadPosts error:', e); document.getElementById('postList').innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-secondary);">加载失败</div>'; }
}

function renderPostCard(post) {
    const author = post.author;
    const images = post.images || [];
    
    let imagesHtml = '';
    if (images.length > 0) {
        const gridClass = images.length === 1 ? 'one-image' : images.length === 2 ? 'two-images' : 'three-images';
        imagesHtml = `
            <div class="post-images ${gridClass}">
                ${images.map(img => `<img src="${img}" alt="">`).join('')}
            </div>
        `;
    }
    
    return `
        <div class="post-card" data-post-id="${post.id}">
            <div class="post-header">
                <div class="post-avatar" onclick="location.href='/user/${author.id}'">
                    ${author.avatar 
                        ? `<img src="${author.avatar}" alt="${author.nickname}">`
                        : `<div style="width:100%;height:100%;background:var(--bg-input);display:flex;align-items:center;justify-content:center;"><i class="fas fa-user" style="color:var(--text-muted);"></i></div>`
                    }
                </div>
                <div class="post-author-info">
                    <div class="post-author-name">${author.nickname}</div>
                    <div class="post-time">${timeAgo(post.created_at)}</div>
                </div>
            </div>
            ${imagesHtml}
            <div class="post-content">${post.content}</div>
            <div class="post-actions">
                <div class="post-action" onclick="likePost(${post.id})">
                    <i class="fas fa-heart"></i>
                    <span class="like-count">${post.like_count}</span>
                </div>
                <div class="post-action" onclick="viewComments(${post.id})">
                    <i class="fas fa-comment"></i>
                    <span>${post.comment_count}</span>
                </div>
                <div class="post-action">
                    <i class="fas fa-share"></i>
                    <span>分享</span>
                </div>
            </div>
        </div>
    `;
}

async function likePost(postId) {
    const response = await api(`/api/post/${postId}/like`, { method: 'POST' });
    if (response.success) {
        loadPosts(); // 简单刷新
    }
}

function viewComments(postId) {
    location.href = `/post/${postId}`;
}

function openPostModal() {
    document.getElementById('postModal').classList.add('active');
    document.getElementById('postContent').focus();
}

function closePostModal() {
    document.getElementById('postModal').classList.remove('active');
    document.getElementById('postContent').value = '';
    selectedImages = [];
    renderImagePreviews();
}

function handleImageSelect(input) {
    const files = Array.from(input.files).slice(0, 9 - selectedImages.length);
    files.forEach(file => {
        const reader = new FileReader();
        reader.onload = (e) => {
            selectedImages.push(e.target.result);
            renderImagePreviews();
        };
        reader.readAsDataURL(file);
    });
    input.value = '';
}

function renderImagePreviews() {
    const container = document.getElementById('imagesPreview');
    let html = selectedImages.map((img, index) => `
        <div class="preview-item">
            <img src="${img}" alt="">
            <div class="remove-btn" onclick="removeImage(${index})"><i class="fas fa-times"></i></div>
        </div>
    `).join('');
    
    if (selectedImages.length < 9) {
        html += `
            <div class="add-btn" onclick="document.getElementById('postImages').click()">
                <i class="fas fa-plus"></i>
            </div>
        `;
    }
    
    container.innerHTML = html;
}

function removeImage(index) {
    selectedImages.splice(index, 1);
    renderImagePreviews();
}

async function submitPost() {
    const content = document.getElementById('postContent').value.trim();
    
    if (!content && selectedImages.length === 0) {
        showToast('请输入内容或选择图片', 'error');
        return;
    }
    
    const formData = new FormData();
    formData.append('content', content);
    
    // 将图片转为Blob
    for (let i = 0; i < selectedImages.length; i++) {
        const blob = await fetch(selectedImages[i]).then(r => r.blob());
        formData.append('images', blob, `image_${i}.jpg`);
    }
    
    const response = await fetch('/api/post/create', {
        method: 'POST',
        body: formData
    });
    
    const result = await response.json();
    
    if (result.success) {
        showToast('发布成功');
        closePostModal();
        loadPosts();
    } else {
        showToast(result.message, 'error');
    }
}

// 排序切换
document.querySelectorAll('.sort-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentSort = btn.dataset.sort;
        loadPosts();
    });
});

// 页面加载
document.addEventListener('DOMContentLoaded', loadPosts);
</script>
{% endblock %}
