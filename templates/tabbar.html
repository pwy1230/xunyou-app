
<nav class="tab-bar">
    <a href="{{ url_for('home') }}" class="tab-item {% if request.endpoint == 'home' %}active{% endif %}">
        <i class="fas fa-compass"></i>
        <span>首页</span>
    </a>
    <a href="{{ url_for('square') }}" class="tab-item {% if request.endpoint == 'square' %}active{% endif %}">
        <i class="fas fa-th-large"></i>
        <span>动态</span>
    </a>
    <a href="{{ url_for('messages') }}" class="tab-item {% if request.endpoint in ['messages', 'chat'] %}active{% endif %}">
        <i class="fas fa-comment-dots"></i>
        <span>消息</span>
        <span class="badge" id="tabMsgBadge" style="display:none;">0</span>
    </a>
    <a href="{{ url_for('my_profile') }}" class="tab-item {% if request.endpoint in ['my_profile', 'user_profile', 'profile'] %}active{% endif %}">
        <i class="fas fa-user"></i>
        <span>我的</span>
    </a>
</nav>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // 更新消息Badge
    async function updateMsgBadge() {
        try {
            const res = await api('/api/messages/unread-count');
            if (res && res.success && res.count > 0) {
                var badges = document.querySelectorAll('#msgBadge, #tabMsgBadge');
                badges.forEach(function(b) { b.textContent = res.count; b.style.display = ''; });
            } else {
                var badges = document.querySelectorAll('#msgBadge, #tabMsgBadge');
                badges.forEach(function(b) { b.style.display = 'none'; });
            }
        } catch(e) {}
    }
    
    updateMsgBadge();
    setInterval(updateMsgBadge, 30000);
});
</script>
